name: IRS - P-Box Engine

# Set tests run on push and pull requests
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Build a linux server with the required dependencies
# to finally runt the tests located in tests/
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Check out the code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up the Python environment (3.9 as defined in README)
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    # Install the required libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Run tests using Python's built-in discover tool to find and run all test_*.py files in the tests/ folder
    - name: Execute Unit Tests
      run: |
        python -m unittest discover -s tests/ -p "test_*.py" -v